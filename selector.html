<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>选择功能页面 - 清枢致远</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--g1:#1a4a2a;--g4:#60c080;--g5:#7ec87b;--g6:#b8e9c0;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','Microsoft YaHei','PingFang SC',system-ui,sans-serif;}
body{
  width:100vw;height:100vh;position:relative;overflow:hidden;
  color:#2c3e2c;
}

/* === 背景 === */
.bg-layer{position:fixed;inset:0;z-index:0;}
.bg-grad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(96,192,128,0.2) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(74,154,74,0.25) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(30,80,40,0.35) 0%,transparent 45%),
    linear-gradient(180deg,#0d2a15 0%,#1a4a2a 25%,#2a6a3a 50%,#3a8a48 70%,#4a9a50 100%);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:50px 50px;animation:gridMove 20s linear infinite;
}
@keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(50px,50px)}}
.bld{position:absolute;bottom:0;border-radius:2px 2px 0 0;}
.bld::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(96,192,128,0.3);}
.b1{left:5%;width:14%;height:40%;background:linear-gradient(180deg,rgba(30,70,35,0.6),rgba(15,40,20,0.85));}
.b2{left:21%;width:10%;height:50%;background:linear-gradient(180deg,rgba(25,60,30,0.7),rgba(10,30,15,0.9));}
.b3{left:33%;width:18%;height:35%;background:linear-gradient(180deg,rgba(35,80,40,0.6),rgba(20,50,25,0.8));}
.b4{left:53%;width:12%;height:45%;background:linear-gradient(180deg,rgba(28,65,32,0.65),rgba(12,35,18,0.85));}
.b5{left:67%;width:16%;height:33%;background:linear-gradient(180deg,rgba(32,75,38,0.6),rgba(18,45,22,0.8));}
.b6{left:85%;width:10%;height:48%;background:linear-gradient(180deg,rgba(22,55,28,0.7),rgba(8,25,12,0.9));}
.forest{position:absolute;bottom:0;left:0;right:0;height:22%;
  background:linear-gradient(180deg,transparent 0%,rgba(20,60,25,0.35) 30%,rgba(15,45,20,0.75) 65%,rgba(10,30,15,0.95) 100%);}

/* === 内容层 === */
.top-logo{
  position:absolute;top:30px;left:40px;z-index:2;
  display:flex;align-items:center;gap:12px;
}
.logo-icon{
  width:50px;height:50px;background:linear-gradient(135deg,#60c080,#3a8a48);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:24px;box-shadow:0 4px 16px rgba(0,0,0,0.2);
}
.logo-text{font-size:28px;color:#fff;font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,0.25);}

.user-top{
  position:absolute;top:35px;right:40px;z-index:2;
  padding:9px 22px;background:rgba(96,192,128,0.9);color:#fff;
  border-radius:24px;font-size:15px;font-weight:600;
  border:1px solid rgba(126,200,123,0.4);
  text-decoration:none;transition:all 0.3s;backdrop-filter:blur(8px);
}
.user-top:hover{background:rgba(110,210,140,0.95);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.15);}

/* === 三选一卡片区 === */
.choose-card{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;
  width:80%;max-width:1000px;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.5);border-radius:20px;
  padding:50px 40px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.15),inset 0 1px 0 rgba(255,255,255,0.6);
}
.choose-title{font-size:28px;color:var(--g4);font-weight:800;margin-bottom:44px;}
.row-box{display:flex;justify-content:center;gap:36px;}
.item-box{
  width:230px;background:linear-gradient(150deg,#e6f9e9 0%,#c8eac8 40%,#b8e9c0 100%);
  border:2px solid transparent;border-radius:20px;padding:42px 24px;
  cursor:pointer;transition:all 0.35s cubic-bezier(0.25,0.8,0.25,1.2);
  text-decoration:none;color:inherit;position:relative;overflow:hidden;
}
.item-box::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.35s;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,0.4) 0%,transparent 60%);
}
.item-box:hover::before{opacity:1;}
.item-box:hover{
  transform:translateY(-8px);border-color:var(--g4);
  box-shadow:0 14px 36px rgba(96,192,128,0.25);
}
.item-icon{font-size:46px;margin-bottom:22px;position:relative;z-index:1;}
.item-name{font-size:22px;color:#333;font-weight:800;position:relative;z-index:1;}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-grad"></div><div class="bg-grid"></div>
  <div class="bld b1"></div><div class="bld b2"></div><div class="bld b3"></div>
  <div class="bld b4"></div><div class="bld b5"></div><div class="bld b6"></div>
  <div class="forest"></div>
</div>

<div class="top-logo">
  <div class="logo-icon">标</div>
  <div class="logo-text">清枢致远</div>
</div>

<a href="/logout" class="user-top">👤 已登录</a>

<div class="choose-card" id="chooseCard">
  <div class="choose-title">请选择进入对应平台</div>
  <div class="row-box">
    <a class="item-box" href="/forum">
      <div class="item-icon">💬</div>
      <div class="item-name">交流平台</div>
    </a>
    <a class="item-box" href="/dashboard">
      <div class="item-icon">📊</div>
      <div class="item-name">监测平台</div>
    </a>
    <a class="item-box" href="/dispatch">
      <div class="item-icon">🔗</div>
      <div class="item-name">调度模型</div>
    </a>
  </div>
</div>

<script>
gsap.fromTo('.bld',{opacity:0,y:30},{opacity:1,y:0,duration:0.6,stagger:0.06,ease:'power2.out',delay:0.1});
gsap.fromTo('#chooseCard',{opacity:0,y:40,scale:0.94},{opacity:1,y:0,scale:1,duration:0.7,ease:'power3.out',delay:0.3});
gsap.fromTo('.item-box',{opacity:0,y:20},{opacity:1,y:0,duration:0.5,stagger:0.1,ease:'power2.out',delay:0.7});
</script>
</body>
</html>
