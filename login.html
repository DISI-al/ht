<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - 清枢致远</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--g4:#60c080;--g5:#7ec87b;--g6:#b8e9c0;}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Microsoft YaHei','PingFang SC',system-ui,sans-serif;
  min-height:100vh;overflow:hidden;color:#2c3e2c;
}

/* === 背景 === */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-grad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(96,192,128,0.2) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(74,154,74,0.25) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(30,80,40,0.35) 0%,transparent 45%),
    linear-gradient(180deg,#0d2a15 0%,#1a4a2a 25%,#2a6a3a 50%,#3a8a48 70%,#4a9a50 100%);
}
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
  background-size:50px 50px;
}
/* 二进制 */
.binary-overlay{
  position:absolute;inset:0;opacity:0.06;overflow:hidden;
  font-family:'Courier New',monospace;font-size:15px;color:#fff;
  line-height:1.5;white-space:pre;pointer-events:none;
}
.bld{position:absolute;bottom:0;border-radius:2px 2px 0 0;}
.bld::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(96,192,128,0.35);}
.b1{left:5%;width:14%;height:42%;background:linear-gradient(180deg,rgba(30,70,35,0.7),rgba(15,40,20,0.9));}
.b2{left:21%;width:10%;height:54%;background:linear-gradient(180deg,rgba(25,60,30,0.75),rgba(10,30,15,0.95));}
.b3{left:33%;width:18%;height:38%;background:linear-gradient(180deg,rgba(35,80,40,0.65),rgba(20,50,25,0.85));}
.b4{left:53%;width:12%;height:48%;background:linear-gradient(180deg,rgba(28,65,32,0.7),rgba(12,35,18,0.9));}
.b5{left:67%;width:16%;height:36%;background:linear-gradient(180deg,rgba(32,75,38,0.65),rgba(18,45,22,0.85));}
.b6{left:85%;width:10%;height:50%;background:linear-gradient(180deg,rgba(22,55,28,0.75),rgba(8,25,12,0.95));}
.forest{position:absolute;bottom:0;left:0;right:0;height:25%;
  background:linear-gradient(180deg,transparent 0%,rgba(20,60,25,0.4) 30%,rgba(15,45,20,0.8) 65%,rgba(10,30,15,0.98) 100%);}

/* === 内容 === */
.content{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;padding:18px 36px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(200,240,208,0.9));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 16px rgba(0,0,0,0.2);}
.logo-text{font-size:24px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.25);}

.login-wrapper{flex:1;display:flex;align-items:center;justify-content:center;}
.login-card{
  background:linear-gradient(170deg,rgba(235,249,238,0.95),rgba(184,233,192,0.9));
  backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);
  border-radius:20px;padding:44px 40px;width:400px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.2),0 4px 16px rgba(0,0,0,0.1),inset 0 1px 0 rgba(255,255,255,0.5);
}
.login-card .card-icon{
  width:60px;height:60px;border-radius:16px;margin:0 auto 18px;
  background:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
}
.login-card h2{font-size:22px;font-weight:600;color:#333;margin-bottom:4px;}
.login-card h3{font-size:24px;font-weight:800;color:#1a4a2a;margin-bottom:28px;}
.form-group{margin-bottom:16px;text-align:left;}
.form-group label{display:block;font-size:13px;color:#444;margin-bottom:6px;font-weight:600;}
.form-group input{
  width:100%;height:42px;padding:0 14px;border:2px solid rgba(0,0,0,0.08);border-radius:8px;
  font-size:14px;outline:none;background:#fff;transition:all 0.3s;
}
.form-group input:focus{border-color:#60c080;box-shadow:0 0 0 4px rgba(96,192,128,0.12);}
.submit-btn{
  width:100%;height:44px;margin-top:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#3a8a40,#60c080);
  color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.35s;
  box-shadow:0 4px 16px rgba(96,192,128,0.35);
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(96,192,128,0.5);}
.register-link{display:block;margin-top:16px;font-size:14px;color:#3388cc;text-decoration:none;transition:color 0.3s;}
.register-link:hover{color:#2060a0;text-decoration:underline;}
.error-msg{color:#e04040;font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-grad"></div><div class="bg-grid"></div>
  <div class="binary-overlay" id="binary"></div>
  <div class="bld b1"></div><div class="bld b2"></div><div class="bld b3"></div>
  <div class="bld b4"></div><div class="bld b5"></div><div class="bld b6"></div>
  <div class="forest"></div>
</div>
<div class="content">
  <div class="top-bar">
    <div class="logo"><div class="logo-icon">🌿</div><span class="logo-text">清枢致远</span></div>
  </div>
  <div class="login-wrapper">
    <div class="login-card" id="loginCard">
      <div class="card-icon">🌱</div>
      <h2>欢迎登录 清枢致远</h2>
      <h3>数据中心碳交流管理平台</h3>
      <form method="POST" action="/login">
        <div class="form-group">
          <label>用户名 Username</label>
          <input type="text" name="username" placeholder="请输入用户名" autocomplete="off">
        </div>
        <div class="form-group">
          <label>密码 Password</label>
          <input type="password" name="password" placeholder="请输入密码">
        </div>
        <input type="hidden" name="next" id="nextUrl" value="">
        <button type="submit" class="submit-btn">登 录</button>
      </form>
      <div class="error-msg" id="err"></div>
      <a href="/register-page" class="register-link">没有账号? 点我注册 Register</a>
    </div>
  </div>
</div>
<script>
// 二进制背景
(function(){
  var b=document.getElementById('binary'),txt='';
  var cols=Math.floor(window.innerWidth/14),rows=Math.floor(window.innerHeight/22);
  for(var r=0;r<rows;r++){for(var c=0;c<cols;c++)txt+=Math.random()>0.5?'0':'1';txt+='\n';}
  b.textContent=txt;
})();
document.getElementById('nextUrl').value=new URLSearchParams(window.location.search).get('next')||'/selector';
if(window.location.search.includes('error=1'))document.getElementById('err').textContent='用户名或密码错误，请重试';
// GSAP
gsap.fromTo('#loginCard',{opacity:0,y:30,scale:0.95},{opacity:1,y:0,scale:1,duration:0.7,ease:'power3.out',delay:0.3});
gsap.fromTo('.bld',{opacity:0,y:30},{opacity:1,y:0,duration:0.7,stagger:0.06,ease:'power2.out',delay:0.1});
</script>
</body>
</html>
