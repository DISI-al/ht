<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 - 清枢致远</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--g4:#60c080;--g5:#7ec87b;}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Microsoft YaHei','PingFang SC',system-ui,sans-serif;
  min-height:100vh;overflow:hidden;color:#2c3e2c;
}
.bg-layer{position:fixed;inset:0;z-index:0;}
.bg-grad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(96,192,128,0.2) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(74,154,74,0.25) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(30,80,40,0.35) 0%,transparent 45%),
    linear-gradient(180deg,#0d2a15 0%,#1a4a2a 25%,#2a6a3a 50%,#3a8a48 70%,#4a9a50 100%);
}
.bld{position:absolute;bottom:0;border-radius:2px 2px 0 0;}
.bld::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(96,192,128,0.35);}
.b1{left:5%;width:14%;height:40%;background:linear-gradient(180deg,rgba(30,70,35,0.6),rgba(15,40,20,0.85));}
.b2{left:25%;width:10%;height:50%;background:linear-gradient(180deg,rgba(25,60,30,0.7),rgba(10,30,15,0.9));}
.b3{left:39%;width:18%;height:35%;background:linear-gradient(180deg,rgba(35,80,40,0.6),rgba(20,50,25,0.8));}
.b4{left:60%;width:12%;height:45%;background:linear-gradient(180deg,rgba(28,65,32,0.65),rgba(12,35,18,0.85));}
.b5{left:75%;width:16%;height:33%;background:linear-gradient(180deg,rgba(32,75,38,0.6),rgba(18,45,22,0.8));}
.forest{position:absolute;bottom:0;left:0;right:0;height:22%;
  background:linear-gradient(180deg,transparent 0%,rgba(20,60,25,0.35) 30%,rgba(15,45,20,0.75) 65%,rgba(10,30,15,0.95) 100%);}
.content{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;padding:18px 36px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(200,240,208,0.9));display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-size:24px;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.25);}
.register-wrapper{flex:1;display:flex;align-items:center;justify-content:center;}
.register-card{
  background:linear-gradient(170deg,rgba(235,249,238,0.95),rgba(184,233,192,0.9));
  backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);
  border-radius:20px;padding:44px 40px;width:400px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.5);
}
.register-card h2{font-size:22px;color:#1a4a2a;margin-bottom:6px;}
.register-card h3{font-size:15px;color:#5a7a5a;margin-bottom:24px;}
.form-group{margin-bottom:16px;text-align:left;}
.form-group label{display:block;font-size:13px;color:#444;margin-bottom:6px;font-weight:600;}
.form-group input{width:100%;height:42px;padding:0 14px;border:2px solid rgba(0,0,0,0.08);border-radius:8px;font-size:14px;outline:none;background:#fff;transition:all 0.3s;}
.form-group input:focus{border-color:#60c080;box-shadow:0 0 0 4px rgba(96,192,128,0.12);}
.submit-btn{width:100%;height:44px;margin-top:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#3a8a40,#60c080);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.35s;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(96,192,128,0.5);}
.login-link{display:block;margin-top:16px;font-size:14px;color:#3388cc;text-decoration:none;}
.login-link:hover{text-decoration:underline;}
.error-msg{color:#e04040;font-size:13px;margin-top:10px;min-height:18px;}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-grad"></div>
  <div class="bld b1"></div><div class="bld b2"></div><div class="bld b3"></div><div class="bld b4"></div><div class="bld b5"></div>
  <div class="forest"></div>
</div>
<div class="content">
  <div class="top-bar">
    <div class="logo"><div class="logo-icon">🌿</div><span class="logo-text">清枢致远</span></div>
  </div>
  <div class="register-wrapper">
    <div class="register-card" id="regCard">
      <h2>注册新账号</h2>
      <h3>加入数据中心碳交流管理平台</h3>
      <form method="POST" action="/register">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="submit-btn">注 册</button>
      </form>
      <div class="error-msg" id="err"></div>
      <a href="/login-page" class="login-link">已有账号? 返回登录</a>
    </div>
  </div>
</div>
<script>
var params=new URLSearchParams(window.location.search);
if(params.get('error')==='empty')document.getElementById('err').textContent='用户名和密码不能为空';
if(params.get('error')==='exists')document.getElementById('err').textContent='用户名已存在，请换一个';
gsap.fromTo('#regCard',{opacity:0,y:30,scale:0.95},{opacity:1,y:0,scale:1,duration:0.7,ease:'power3.out',delay:0.3});
</script>
</body>
</html>
