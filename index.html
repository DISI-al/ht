<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>清枢致远 - 数据中心交流平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --g1:#1a4a2a;--g2:#2d6a3a;--g3:#4a9a50;--g4:#60c080;--g5:#7ec87b;--g6:#b8e9c0;
  --card-bg:rgba(255,255,255,0.92);--text:#2c3e2c;--muted:#5a7a5a;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter','Microsoft YaHei','PingFang SC',system-ui,sans-serif;
  min-height:100vh;overflow-x:hidden;color:var(--text);
  background:#0d2a15;
}
/* === 高级背景 === */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-grad{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(96,192,128,0.25) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 60%,rgba(74,154,74,0.3) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 30%,rgba(30,80,40,0.4) 0%,transparent 45%),
    linear-gradient(180deg,#0d2a15 0%,#1a4a2a 25%,#2a6a3a 50%,#3a8a48 70%,#4a9a50 90%,#3a7a40 100%);
}
/* 网格线 */
.bg-grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridMove 20s linear infinite;
}
@keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
/* 粒子 */
.particles{position:absolute;inset:0;}
.particle{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:rgba(96,192,128,0.5);box-shadow:0 0 6px rgba(96,192,128,0.3);
}
/* 建筑剪影 */
.bld{position:absolute;bottom:0;border-radius:2px 2px 0 0;}
.bld::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:rgba(96,192,128,0.4);
}
.b1{left:5%;width:16%;height:48%;background:linear-gradient(180deg,rgba(30,70,35,0.75),rgba(15,40,20,0.95));box-shadow:0 0 30px rgba(96,192,128,0.08);}
.b2{left:23%;width:10%;height:58%;background:linear-gradient(180deg,rgba(25,60,30,0.8),rgba(10,30,15,0.95));}
.b3{left:35%;width:20%;height:42%;background:linear-gradient(180deg,rgba(35,80,40,0.7),rgba(20,50,25,0.9));}
.b4{left:57%;width:13%;height:52%;background:linear-gradient(180deg,rgba(28,65,32,0.75),rgba(12,35,18,0.95));}
.b5{left:72%;width:17%;height:38%;background:linear-gradient(180deg,rgba(32,75,38,0.7),rgba(18,45,22,0.9));}
.b6{left:91%;width:9%;height:55%;background:linear-gradient(180deg,rgba(22,55,28,0.8),rgba(8,25,12,0.95));}
/* 森林层 */
.forest{position:absolute;bottom:0;left:0;right:0;height:28%;
  background:linear-gradient(180deg,transparent 0%,rgba(20,60,25,0.5) 25%,rgba(15,45,20,0.85) 60%,rgba(10,30,15,0.98) 100%);
}

/* === 内容层 === */
.content{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;}
.logo{display:flex;align-items:center;gap:12px;}
.logo-icon{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg,rgba(255,255,255,0.95),rgba(200,240,208,0.9));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 2px 16px rgba(0,0,0,0.2);
  backdrop-filter:blur(10px);
}
.logo-text{font-size:24px;font-weight:800;color:#fff;letter-spacing:0.04em;text-shadow:0 2px 10px rgba(0,0,0,0.25);}
.login-top-btn{
  display:flex;align-items:center;gap:7px;padding:10px 24px;
  background:rgba(96,192,128,0.9);color:#fff;border:1px solid rgba(126,200,123,0.5);
  border-radius:24px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;
  transition:all 0.35s;backdrop-filter:blur(8px);
  box-shadow:0 4px 16px rgba(96,192,128,0.25);
}
.login-top-btn:hover{
  background:rgba(110,210,140,0.95);transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(96,192,128,0.4);border-color:rgba(180,230,200,0.6);
}

/* 主卡片 */
.hero-area{flex:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:80px;padding-inline:20px;}
.hero-card{
  background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.6);border-radius:24px;
  padding:44px 56px;width:82%;max-width:1050px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.15),0 4px 16px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.6);
}
.hero-card h1{
  font-size:32px;font-weight:800;color:#1a4a2a;margin-bottom:8px;letter-spacing:0.03em;
}
.hero-card .subtitle{font-size:14px;color:#5a7a5a;margin-bottom:32px;}

.func-row{display:flex;gap:24px;}
.func-card{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:16px;
  padding:34px 22px;border-radius:18px;border:2px solid transparent;
  background:linear-gradient(170deg,#ebf9ee 0%,#d0f0d6 50%,#bae8c2 100%);
  cursor:pointer;text-decoration:none;color:inherit;
  transition:all 0.4s cubic-bezier(0.25,0.8,0.25,1.2);
  position:relative;overflow:hidden;
}
.func-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.4s;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,0.4) 0%,transparent 60%);
}
.func-card:hover::before{opacity:1;}
.func-card:hover{
  transform:translateY(-6px);border-color:var(--g4);
  box-shadow:0 12px 40px rgba(96,192,128,0.2),0 4px 12px rgba(0,0,0,0.06);
}
.func-icon{
  width:64px;height:64px;border-radius:16px;background:#fff;
  display:flex;align-items:center;justify-content:center;font-size:30px;
  box-shadow:0 4px 16px rgba(0,0,0,0.06);position:relative;z-index:1;
}
.func-label{font-size:22px;font-weight:700;color:#1a4a2a;position:relative;z-index:1;}
.func-desc{font-size:12px;color:#5a7a5a;position:relative;z-index:1;}

/* 数字人偶动画 */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="bg-grad"></div><div class="bg-grid"></div>
  <div class="particles" id="particles"></div>
  <div class="bld b1"></div><div class="bld b2"></div><div class="bld b3"></div>
  <div class="bld b4"></div><div class="bld b5"></div><div class="bld b6"></div>
  <div class="forest"></div>
</div>
<div class="content">
  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">🌿</div>
      <span class="logo-text">清枢致远</span>
    </div>
    <a href="/login-page" class="login-top-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>
      登录
    </a>
  </div>
  <div class="hero-area">
    <div class="hero-card" id="heroCard">
      <h1>清枢致远 数据中心交流平台</h1>
      <div class="subtitle">AI零碳化能源调度 · 技术交流与协作共享</div>
      <div class="func-row">
        <a href="/login-page" class="func-card">
          <div class="func-icon">💬</div>
          <div class="func-label">交流平台</div>
          <div class="func-desc">数据中心技术协作论坛</div>
        </a>
        <a href="/login-page?next=/dashboard" class="func-card">
          <div class="func-icon">📊</div>
          <div class="func-label">监测平台</div>
          <div class="func-desc">实时能源监控仪表板</div>
        </a>
        <a href="/login-page?next=/dispatch" class="func-card">
          <div class="func-icon">⚙️</div>
          <div class="func-label">调度模型</div>
          <div class="func-desc">AI多目标优化引擎</div>
        </a>
      </div>
    </div>
  </div>
</div>
<script>
// 粒子生成
(function(){
  var p=document.getElementById('particles'),h='';
  for(var i=0;i<60;i++){
    var l=Math.random()*100,t=Math.random()*100;
    h+='<div class="particle" style="left:'+l+'%;top:'+t+'%;opacity:'+(0.2+Math.random()*0.5)+';animation:float '+(3+Math.random()*5)+'s ease-in-out infinite;animation-delay:'+Math.random()*3+'s;"></div>';
  }
  p.innerHTML=h;
})();
// GSAP
gsap.fromTo('.bld',{opacity:0,y:40},{opacity:1,y:0,duration:0.8,stagger:0.08,ease:'power3.out',delay:0.2});
gsap.fromTo('#heroCard',{opacity:0,y:40,scale:0.96},{opacity:1,y:0,scale:1,duration:0.8,ease:'power3.out',delay:0.5});
gsap.fromTo('.func-card',{opacity:0,y:20},{opacity:1,y:0,duration:0.5,stagger:0.1,ease:'power2.out',delay:0.9});
</script>
</body>
</html>
